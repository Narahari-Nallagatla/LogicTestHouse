trigger:
- master
- dev

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  serviceConnectionName: 'MyAzureResourceConnection' 
  appServiceName: 'DemoLogicAppApi'
  resourceGroupName: 'WP_SL_User_187'

stages:

# ==========================================
# STAGE 1: COMPILATION & PACKAGING (BUILD)
# ==========================================
- stage: Build
  displayName: 'Build C# Application Package'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Use Pre-installed .NET SDK'
      inputs:
        packageType: sdk
        version: '9.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore Dependencies'
      inputs:
        command: restore
        projects: '*.sln'

    - task: DotNetCoreCLI@2
      displayName: 'Compile Project Binaries'
      inputs:
        command: build
        projects: '*.sln'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Deployment Package'
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-restore'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Upload Artifact'

# ==========================================
# STAGE 2: AUTOMATED PRODUCTION DEPLOYMENT
# ==========================================
- stage: Stage_Prod
  displayName: 'Stage-Prod Automated Deployment'
  dependsOn: Build
  jobs:
  - deployment: DeployToProdSlot
    displayName: 'Deploy Package directly to Production Slot'
    environment: 'Production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Deploy directly to Main Production App Service'
            inputs:
              azureSubscription: '$(serviceConnectionName)'
              appType: 'webApp'
              appName: '$(appServiceName)'
              deployToSlotOrASE: false
              package: '$(Pipeline.Workspace)/drop/**/*.zip'