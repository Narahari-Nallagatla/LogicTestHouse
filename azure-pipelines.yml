trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  NUGET_PACKAGES_DIRECTORY: '$(Pipeline.Workspace)/.nuget/packages'

stages:
# ==========================================================
# STAGE 1: COMPILATION & ARTIFACT PACKAGING ONLY
# ==========================================================
- stage: Build
  displayName: 'Build MVC Application Artifact'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Use Pre-installed .NET SDK'
      inputs:
        packageType: sdk
        version: '9.x'
        performMultiLevelLookup: true

    - task: Cache@2
      displayName: 'Cache NuGet Packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | **/*.csproj'
        restoreKeys: |
          nuget | "$(Agent.OS)"
        path: $(NUGET_PACKAGES_DIRECTORY)
        cacheHitVar: 'CACHE_RESTORED'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet Dependencies'
      inputs:
        command: restore
        projects: '**/*.csproj'
        restoreArguments: '--packages $(NUGET_PACKAGES_DIRECTORY)'

    - task: DotNetCoreCLI@2
      displayName: 'Compile Project Binaries'
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Deployment Package'
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-restore'
        zipAfterPublish: true

    # The resulting drop artifact will be consumed by the Classic Release Pipeline
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Upload Build Artifact drop'