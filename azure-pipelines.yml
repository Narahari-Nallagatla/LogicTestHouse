trigger:
- main
- dev

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrLoginServer: 'acrmylogicapp187.azurecr.io' 
  imageRepository: 'demo-logic-app-api'
  dockerRegistryServiceConnection: 'MyACRConnection'
  kubernetesServiceConnection: 'MyAKSConnection'
  tag: '$(Build.BuildId)'

stages:
# ==========================================
# STAGE 1: CONTAINERIZATION & ACR REGISTRY PUSH
# ==========================================
- stage: BuildAndPush
  displayName: 'CI Stage: Containerize & Push'
  jobs:
  - job: BuildDockerJob
    displayName: 'Execute Docker Build and Publish'
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        command: 'build'
        dockerfile: '$(Build.SourcesDirectory)/DemoLogicAppApi/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Publish Image to ACR'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        command: 'push'
        tags: |
          $(tag)
          latest

    - task: CopyFiles@2
      displayName: 'Staging Kubernetes Manifests'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        # Captures both .yml and .yaml extensions safely
        Contents: '**/manifests/*.yam*'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        CleanTargetFolder: true
        flattenFolders: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Kubernetes Blueprints'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'k8s-manifests'
        publishLocation: 'pipeline'

# ==========================================
# STAGE 2: KUBERNETES ORCHESTRATION & AKS DEPLOY
# ==========================================
- stage: DeployToAKS
  displayName: 'CD Stage: Kubernetes Orchestration'
  dependsOn: BuildAndPush
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to AKS Cluster Pods'
    environment: 'KubernetesProduction'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: k8s-manifests

          # FIX: Diagnostic file checking + Dynamic find execution
          - script: |
              echo "=== Diagnostic: Listing all downloaded files ==="
              ls -R $(Pipeline.Workspace)/k8s-manifests
              
              REAL_IMAGE="$(acrLoginServer)/$(imageRepository):$(tag)"
              echo "Target Image Path: ${REAL_IMAGE}"
              
              echo "=== Modifying deployment configuration ==="
              # Finds the deployment file dynamically and updates it in place
              find $(Pipeline.Workspace)/k8s-manifests -type f \( -name "*deployment.yml" -o -name "*deployment.yaml" \) -exec sed -i "s|__IMAGE_PLACEHOLDER__|${REAL_IMAGE}|g" {} +
            displayName: 'Inject Real ACR Image Path via Shell'

          - task: KubernetesManifest@1
            displayName: 'Deploy Manifests to AKS Cluster'
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: $(kubernetesServiceConnection)
              # Points directly to the directory containing the files
              manifests: '$(Pipeline.Workspace)/k8s-manifests'