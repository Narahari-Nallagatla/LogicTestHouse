trigger:
- main
- dev

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrLoginServer: 'acrmylogicapp187.azurecr.io' 
  imageRepository: 'demo-logic-app-api'
  dockerRegistryServiceConnection: 'MyACRConnection'
  kubernetesServiceConnection: 'MyAKSConnection'
  tag: '$(Build.BuildId)'

stages:
- stage: BuildAndPush
  displayName: 'CI Stage: Containerize & Push'
  jobs:
  - job: BuildDockerJob
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: 'build'
        repository: $(imageRepository)
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Publish Image to ACR'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        command: 'push'
        tags: |
          $(tag)
          latest

    - publish: manifests
      artifact: k8s-manifests
      displayName: 'Publish Kubernetes Blueprints'

- stage: DeployToAKS
  displayName: 'CD Stage: Kubernetes Orchestration'
  dependsOn: BuildAndPush
  jobs:
  - deployment: DeployJob
    environment: 'KubernetesProduction'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: k8s-manifests

          - script: |
              REAL_IMAGE="$(acrLoginServer)/$(imageRepository):$(tag)"
              sed -i "s|__IMAGE_PLACEHOLDER__|${REAL_IMAGE}|g" $(Pipeline.Workspace)/k8s-manifests/deployment.yml
            displayName: 'Inject Real ACR Image Path via Shell'

          - task: KubernetesManifest@1
            displayName: 'Deploy Manifests to AKS Cluster'
            inputs:
              action: 'deploy'
              connectionType: 'kubernetesServiceConnection'
              kubernetesServiceConnection: $(kubernetesServiceConnection)
              manifests: |
                $(Pipeline.Workspace)/k8s-manifests/deployment.yml
                $(Pipeline.Workspace)/k8s-manifests/service.yml