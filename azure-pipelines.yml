trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =============================
# BUILD
# =============================
- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildJob

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '9.x'

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration Release'

    - task: DotNetCoreCLI@2
      displayName: Publish
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop



# =============================
# QA DEPLOYMENT
# =============================
- stage: DeployQA

  displayName: Deploy to QA

  dependsOn: Build

  jobs:

  - deployment: QADeploy

    environment: QA

    strategy:
      runOnce:

        deploy:

          steps:

          - download: current
            artifact: drop

          - task: AzureWebApp@1

            inputs:

              azureSubscription: 'myservice-connection'
              appType: 'webApp'
              appName: 'aecstestdeployWebApp'

              deployToSlotOrASE: true

              resourceGroupName: 'WP_SL_User_087'

              slotName: 'staging-qa'

              package: '$(Pipeline.Workspace)/drop/**/*.zip'
# =============================
# API FUNCTIONAL TEST
# =============================
- stage: APIFunctionalTest

  displayName: API Functional Testing

  dependsOn: DeployQA

  jobs:

  - job: ValidateAPI

    steps:

    - task: PowerShell@2
      displayName: 'Validate Customers API'
      inputs:
        targetType: inline
        script: |
          # GET Test
          $url = "https://aecstestdeploywebapp-staging-qa.azurewebsites.net/api/customers"

          try
          {
              $response = Invoke-RestMethod -Uri $url -Method Get
              Write-Host " GET Customer Test Passed"
          }
          catch
          {
              Write-Error " GET Customer Test Failed"
              throw
          }

    - task: PowerShell@2
      displayName: 'Validate Create Customer API'

      inputs:
        targetType: inline
        script: |

          $baseUrl = "https://aecstestdeploywebapp-staging-qa.azurewebsites.net/api/customers"

          # Create Customer
          $customerId = Get-Random -Minimum 10000 -Maximum 99999

          $body = @{
              id = $customerId
              name = "Annie Pipeline"
              email = "annie@test.com"
              city = "Chennai"
          } | ConvertTo-Json

          Invoke-RestMethod `
            -Uri $baseUrl `
            -Method Post `
            -Body $body `
            -ContentType "application/json"

          Write-Host "POST Success"

          $customer = Invoke-RestMethod `
            -Uri "$baseUrl/$customerId" `
            -Method Get

          if ($customer.id -eq $customerId)
          {
              Write-Host "Verification Passed"
          }
          else
          {
              throw "Verification Failed"
          }
# =============================
# NON FUNCTIONAL TEST
# =============================
- stage: NonFunctionalTest

  displayName: Performance Test

  dependsOn: APIFunctionalTest

  jobs:

  - job: PerformanceValidation

    steps:

    - task: PowerShell@2
      displayName: 'API Response Time Test'

      inputs:
        targetType: inline
        script: |

          $url = "https://aecsazuredevopslogicapp.azurewebsites.net/api/customers"

          $watch = [System.Diagnostics.Stopwatch]::StartNew()

          Invoke-RestMethod `
            -Uri $url `
            -Method Get

          $watch.Stop()

          $elapsed = $watch.ElapsedMilliseconds

          Write-Host "Response Time = $elapsed ms"

          if($elapsed -gt 3000)
          {
              throw "Performance Test Failed. Response took more than 3 seconds."
          }

          Write-Host "Performance Test Passed"

