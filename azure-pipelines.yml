trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  serviceConnectionName: 'MyAzureResourceConnection' 
  appServiceName: 'DemoLogicAppApi'
  resourceGroupName: 'WP_SL_User_187'
  NUGET_PACKAGES_DIRECTORY: '$(Pipeline.Workspace)/.nuget/packages'

stages:

# ==========================================
# STAGE 1: COMPILATION & ARTIFACT PACKAGING
# ==========================================
- stage: Build
  displayName: 'Build MVC Application'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Use Pre-installed .NET SDK'
      inputs:
        packageType: sdk
        version: '9.x'
        performMultiLevelLookup: true

    # OPTIMIZED FIX: Fingerprint is now generated using the existing .csproj file structure
    - task: Cache@2
      displayName: 'Cache NuGet Packages'
      inputs:
        key: 'nuget | "$(Agent.OS)" | **/DemoLogicAppApi.csproj'
        restoreKeys: |
          nuget | "$(Agent.OS)"
        path: $(NUGET_PACKAGES_DIRECTORY)
        cacheHitVar: 'CACHE_RESTORED'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet Dependencies'
      inputs:
        command: restore
        projects: '**/*.csproj'
        restoreArguments: '--packages $(NUGET_PACKAGES_DIRECTORY)'

    - task: DotNetCoreCLI@2
      displayName: 'Compile Project Binaries'
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Deployment Package'
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory) --no-restore'
        zipAfterPublish: true

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Upload Artifact to Pipeline Workspace'

# ==========================================
# STAGE 2: QA TARGET DEPLOYMENT
# ==========================================
- stage: DeployQA
  displayName: 'Deploy to QA Environment'
  dependsOn: Build
  jobs:
  - job: QADeployJob
    steps:
    - download: current
      artifact: drop
      displayName: 'Download Compilation Artifacts'

    - task: AzureWebApp@1
      displayName: 'Deploy Package to Target Web App'
      inputs:
        azureSubscription: '$(serviceConnectionName)'
        appType: 'webApp'
        appName: '$(appServiceName)'
        deployToSlotOrASE: true
        resourceGroupName: '$(resourceGroupName)'
        slotName: 'staging-qa'
        package: '$(Pipeline.Workspace)/drop/**/*.zip'

# ==========================================
# STAGE 3: QA FUNCTIONAL TEST VERIFICATION
# ==========================================
- stage: APIFunctionalTest
  displayName: 'API Functional Validation'
  dependsOn: DeployQA
  jobs:
  - job: ValidateAPI
    steps:
    - task: PowerShell@2
      displayName: 'Execute HTTP GET Endpoint Test'
      inputs:
        targetType: inline
        script: |
          $appName = "$(appServiceName)"
          $url = "https://$appName-staging-qa.azurewebsites.net/api/customers"
          
          Write-Host "Target Testing URL: $url"
          
          # Retry loop to allow the Azure App Service up to 30 seconds to wake up (Cold Start)
          $retryCount = 0
          $maxRetries = 3
          $success = $false

          while ($retryCount -lt $maxRetries -and -not $success) {
          try {
                  Write-Host "Attempt $($retryCount + 1): Sending GET request to application slot..."
                  $response = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 10
                  
                  # Log the response to the pipeline output window for easy debugging
                  Write-Host "Response received: $($response | ConvertTo-Json -Compress)"
                  $success = $true
          } catch {
                  Write-Host "Warning: Application is still warming up or returned an error: $_"
                  $retryCount++
                  if ($retryCount -lt $maxRetries) {
                      Write-Host "Waiting 10 seconds before retrying..."
                      Start-Sleep -Seconds 10
                  }
              }
          }

          if (-not $success) {
              Write-Error "FAILURE: GET Customer Test Failed after $maxRetries attempts."
              throw "Application endpoint did not respond successfully."
          }
          
          Write-Host "SUCCESS: GET Baseline Endpoint Test Passed"

    - task: PowerShell@2
      displayName: 'Execute HTTP POST Creation Test'
      inputs:
        targetType: inline
        script: |
          $appName = "$(appServiceName)"
          $baseUrl = "https://$appName-staging-qa.azurewebsites.net/api/customers"
          $customerId = Get-Random -Minimum 10000 -Maximum 99999
          
          $body = @{
              id = $customerId
              name = "Hari Pipeline"
              email = "hari@test.com"
              city = "Chennai"
          } | ConvertTo-Json

          Write-Host "Sending POST request to create customer ID: $customerId"
          Invoke-RestMethod -Uri $baseUrl -Method Post -Body $body -ContentType "application/json"
          Write-Host "SUCCESS: POST Execution Completed"

          Write-Host "Verifying customer records by hitting: $baseUrl/$customerId"
          $customer = Invoke-RestMethod -Uri "$baseUrl/$customerId" -Method Get
          if ($customer.id -eq $customerId) {
              Write-Host "SUCCESS: Verification Logic Integrity Validated"
          } else {
              throw "FAILURE: Verification Mismatch Detected"
          }

# ==========================================
# STAGE 4: NON-FUNCTIONAL PERFORMANCE TESTS
# ==========================================
- stage: NonFunctionalTest
  displayName: 'Performance Metric Verification'
  dependsOn: APIFunctionalTest
  jobs:
  - job: PerformanceValidation
    steps:
    - task: PowerShell@2
      displayName: 'Verify Response Time Tolerances'
      inputs:
        targetType: inline
        script: |
          $url = "https://aecsazuredevopslogicapp.azurewebsites.net/api/customers"
          $watch = [System.Diagnostics.Stopwatch]::StartNew()
          
          Invoke-RestMethod -Uri $url -Method Get
          $watch.Stop()
          
          $elapsed = $watch.ElapsedMilliseconds
          Write-Host "Measured Response Metric = $elapsed ms"

          if ($elapsed -gt 3000) {
              throw "FAILURE: Latency breach. Performance took more than 3 seconds."
          }
          Write-Host "SUCCESS: Latency metrics within target bounds."